<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>ESAN RV - Trayectoria Histórica (Nueva Interfaz)</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script>
      // ========================================================
      // COMPONENTE THREE.JS: CUBOS VIVOS (Mantenido)
      // ========================================================
      AFRAME.registerComponent('cubos-digitales', {
        init: function () {
          const scene3D = this.el.sceneEl.object3D;
          this.count = 800; 
          this.geometry = new THREE.BufferGeometry();
          const positions = new Float32Array(this.count * 3);
          const colors = new Float32Array(this.count * 3);
          const colorRojo = new THREE.Color(0xE3173E);   
          const colorCeleste = new THREE.Color(0x00bfff);
          const colorBlanco = new THREE.Color(0xffffff);
          this.velocities = [];

          for (let i = 0; i < this.count; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 50;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 40 + 1.6;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 50;
            const rand = Math.random();
            let selectedColor = rand < 0.33 ? colorRojo : (rand < 0.66 ? colorCeleste : colorBlanco);
            colors[i * 3] = selectedColor.r;
            colors[i * 3 + 1] = selectedColor.g;
            colors[i * 3 + 2] = selectedColor.b;
            this.velocities.push((Math.random() - 0.5) * 0.015, (Math.random() - 0.5) * 0.015, (Math.random() - 0.5) * 0.015);
          }
          this.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
          this.geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
          this.material = new THREE.PointsMaterial({ size: 0.18, vertexColors: true, transparent: true, opacity: 0.8 });
          this.particleSystem = new THREE.Points(this.geometry, this.material);
          scene3D.add(this.particleSystem);
        },
        tick: function (time) {
          if (!this.particleSystem) return;
          const pos = this.geometry.attributes.position.array;
          this.material.size = (Math.sin(time * 0.002) * 0.05) + 0.15;
          for (let i = 0; i < this.count * 3; i++) {
            pos[i] += this.velocities[i];
            if (Math.abs(pos[i]) > 25) this.velocities[i] *= -1;
          }
          this.geometry.attributes.position.needsUpdate = true;
          this.particleSystem.rotation.y += 0.0003;
        }
      });
    </script>
</head>

<body>

<a-scene>
  <a-assets>
    <img id="imgLobby" src="jardinn.jpg">
    <img id="imgAuditorio" src="btcss-1.jpg">
    <img id="imgAuditorio2" src="btcss-1.jpg"> 
    <img id="imgEvento" src="fuentte.jpg">
    <img id="imgLabsNuevos" src="eventoss.jpg">
    
    <img id="iconHistoria" src="https://img.icons8.com/ios-filled/100/ffffff/open-book.png">
    <img id="iconFundador" src="https://img.icons8.com/ios-filled/100/ffffff/user-group-man-man.png">
    <img id="iconGraduado" src="https://img.icons8.com/ios-filled/100/ffffff/graduation-cap.png">
    <img id="iconLabs" src="https://img.icons8.com/ios-filled/100/ffffff/microscope.png">
    <img id="iconTour" src="https://img.icons8.com/ios-filled/100/ffffff/university.png">

    <audio id="audioBienvenida" src="audio.mp3" preload="auto" crossorigin="anonymous"></audio>
    <video id="videoUni" src="video2.mp4" crossorigin="anonymous" playsinline preload="auto"></video>
    <video id="videoFundador" src="video6a.mp4" crossorigin="anonymous" playsinline preload="auto"></video>
    <video id="video8" src="cars.mp4" crossorigin="anonymous" playsinline preload="auto"></video>
    <video id="video7a" src="video7a.mp4" crossorigin="anonymous" playsinline preload="auto"></video> 
  </a-assets>

  <a-sky id="skyPrincipal" src="#imgLobby" radius="40" rotation="0 -90 0"></a-sky>
  <a-entity cubos-digitales></a-entity>

  <a-entity id="panelBienvenida" position="0 2.5 -5" 
            animation="property: position; to: 0 2.5 -3.5; dur: 3000; easing: easeOutQuad">
      <a-plane width="3.5" height="0.8" color="#000000" opacity="0.6" radius="0.1"></a-plane>
      <a-text value="BIENVENIDO AL UNIVERSO ESAN" color="#E3173E" width="4" align="center" position="0 0.15 0.01" font="https://cdn.aframe.io/fonts/Roboto-msdf.json" shader="msdf" bold="true"></a-text>
      <a-text value="Descubre nuestro legado y vive el futuro." color="#FFFFFF" width="3" align="center" position="0 -0.15 0.01" font="https://cdn.aframe.io/fonts/Roboto-msdf.json" shader="msdf"></a-text>
  </a-entity>

  <a-entity id="redNeuronal" visible="true">
      <a-entity line="start: -2.5 0.8 -4; end: 2.5 0.8 -4; color: #FFFFFF; opacity: 0.3"></a-entity>
  </a-entity>

  <a-entity id="menuPrincipal" position="0 1.2 -4">
      
      <a-entity id="btnHistoria" class="clickable" position="-2 0 0">
          <a-circle radius="0.35" color="#E3173E" animation__click="property: scale; from: 1 1 1; to: 1.1 1.1 1.1; dur: 200; startEvents: mouseenter" animation__leave="property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave">
              <a-image src="#iconHistoria" width="0.35" height="0.35" position="0 0 0.02"></a-image>
          </a-circle>
          <a-text value="Nuestra\nHitoria" align="center" position="0 -0.6 0" width="2.5" color="#FFFFFF" font="https://cdn.aframe.io/fonts/Roboto-msdf.json" shader="msdf"></a-text>
      </a-entity>

      <a-entity id="btnFundador" class="clickable" position="-1 0 0">
          <a-circle radius="0.35" color="#E3173E" animation__click="property: scale; from: 1 1 1; to: 1.1 1.1 1.1; dur: 200; startEvents: mouseenter" animation__leave="property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave">
              <a-image src="#iconFundador" width="0.35" height="0.35" position="0 0 0.02"></a-image>
          </a-circle>
          <a-text value="Nuestro\nFundador" align="center" position="0 -0.6 0" width="2.5" color="#FFFFFF"></a-text>
      </a-entity>

      <a-entity id="btnLaboratorios" class="clickable" position="0 0 0">
          <a-circle radius="0.35" color="#E3173E" animation__click="property: scale; from: 1 1 1; to: 1.1 1.1 1.1; dur: 200; startEvents: mouseenter" animation__leave="property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave">
              <a-image src="#iconGraduado" width="0.35" height="0.35" position="0 0 0.02"></a-image>
          </a-circle>
          <a-text value="Carreras que\nTransforman" align="center" position="0 -0.6 0" width="2.5" color="#FFFFFF"></a-text>
      </a-entity>

      <a-entity id="btnNuevosLabs" class="clickable" position="1 0 0">
          <a-circle radius="0.35" color="#E3173E" animation__click="property: scale; from: 1 1 1; to: 1.1 1.1 1.1; dur: 200; startEvents: mouseenter" animation__leave="property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave">
              <a-image src="#iconLabs" width="0.35" height="0.35" position="0 0 0.02"></a-image>
          </a-circle>
          <a-text value="Laboratorios\nTech" align="center" position="0 -0.6 0" width="2.5" color="#FFFFFF"></a-text>
      </a-entity>

      <a-entity id="btnTour" class="clickable" position="2 0 0">
          <a-circle radius="0.35" color="#E3173E" animation__click="property: scale; from: 1 1 1; to: 1.1 1.1 1.1; dur: 200; startEvents: mouseenter" animation__leave="property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave">
              <a-image src="#iconTour" width="0.35" height="0.35" position="0 0 0.02"></a-image>
          </a-circle>
          <a-text value="Tour del\nCampus" align="center" position="0 -0.6 0" width="2.5" color="#FFFFFF"></a-text>
      </a-entity>
  </a-entity>

  <a-entity id="grupoCine" visible="false">
    <a-video id="pantallaVideo" src="#videoUni" width="16" height="9" material="shader: flat"></a-video>
    <a-entity id="interfazCine" position="0 -5 0.1">
        <a-plane width="10" height="0.3" color="#696a6d"></a-plane>
        <a-circle id="btnSalir" class="clickable" radius="0.5" color="#E3173E" position="6 0 0">
            <a-text value="X" align="center" color="white"></a-text>
        </a-circle>
    </a-entity>
  </a-entity>

  <a-entity id="camara" camera look-controls position="0 1.6 0">
    <a-entity cursor="fuse: false; rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
  </a-entity>

  <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 50" line="color: #E3173E"></a-entity>

</a-scene>

<script>
    const audioBienvenida = document.querySelector('#audioBienvenida');
    const skyPrincipal = document.querySelector('#skyPrincipal');
    const menuPrincipal = document.querySelector('#menuPrincipal');
    const panelBienvenida = document.querySelector('#panelBienvenida');
    const grupoCine = document.querySelector('#grupoCine');
    const videoUni = document.querySelector('#videoUni');
    const videoFundador = document.querySelector('#videoFundador');
    const video8 = document.querySelector('#video8');
    const video7a = document.querySelector('#video7a');
    let videoActual = videoUni;

    // Iniciar Audio Mantenido
    window.addEventListener('load', () => {
        setTimeout(() => {
            audioBienvenida.play().catch(e => console.log("Interacción requerida para audio"));
        }, 1000);
    });

    function iniciarCine(videoSeleccionado) {
        videoActual = videoSeleccionado;
        menuPrincipal.setAttribute('visible', 'false');
        panelBienvenida.setAttribute('visible', 'false');
        skyPrincipal.setAttribute('visible', 'false');
        grupoCine.setAttribute('visible', 'true');
        document.querySelector('#pantallaVideo').setAttribute('src', `#${videoSeleccionado.id}`);
        videoActual.play();
    }

    // Eventos de Click Actualizados
    document.querySelector('#btnHistoria').addEventListener('click', () => iniciarCine(videoUni));
    document.querySelector('#btnFundador').addEventListener('click', () => iniciarCine(videoFundador));
    document.querySelector('#btnLaboratorios').addEventListener('click', () => iniciarCine(video8));
    document.querySelector('#btnNuevosLabs').addEventListener('click', () => iniciarCine(video7a));
    document.querySelector('#btnTour').addEventListener('click', () => {
        window.location.href = 'https://esanlabs.github.io/recorrido-2.0/';
    });

    document.querySelector('#btnSalir').addEventListener('click', () => {
        videoActual.pause();
        grupoCine.setAttribute('visible', 'false');
        menuPrincipal.setAttribute('visible', 'true');
        panelBienvenida.setAttribute('visible', 'true');
        skyPrincipal.setAttribute('visible', 'true');
    });

    [videoUni, videoFundador, video8, video7a].forEach(v => v.addEventListener('ended', () => document.querySelector('#btnSalir').click()));
</script>
</body>
</html>
